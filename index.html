 <style>
        .Endorsement {
            position: absolute;
            z-index: 1500;
        }
            .Endorsement img {
                width: 100%;
            }
        #before {
            width: 300px;
            margin-top: 163px;
        }
        #after {
            width: 300px;
            height: 300px;
        }
        #stick {
            width: 20px;
            transform: translate(140px,60px) rotate(3deg);
            transition-duration: 3s;
            transition-timing-function: cubic-bezier(.81,2.13,.27,-0.69);
        }
            #stick:hover {
                transform: translate(140px,0px) rotate(3deg);
                opacity:0.7;
               
            }
    </style>

</head>
<body>

    <div id="after" class="Endorsement"><img src="Endorsement/Endorsement_after.png"></div>
    <div id="stick" class="Endorsement"><img src="Endorsement/stick.png"></div>
