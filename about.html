    <link rel="stylesheet" href="style.css">

    <script src="js/jquery-3.7.1.min.js"></script>
    <script>
        var index = 0;
        var img = new Array("Fengjia.jpg", "Yizhong.jpg", "Tunghai.jpg");
        var title = new Array("安室透教練", "赤井教練", "柯南教練");
        var info = new Array("全能魔鬼訓練流：一邊做三明治、一邊處理公安情報，同時精準計時你的衝刺。", "長距離狙擊流：不陪跑，在700碼外透過狙擊鏡盯著你的姿勢。", "數據狂魔流：精準分析你的心率、步頻、落地角度與VO2 Max。");

        function toHTML(index) {
            var hm = "<img src='images/" + img[index] + "' width='125' style='float:left;margin:10px;'>";
            hm += "<h3>" + title[index] + "</h3>";
            hm += "<p>" + info[index] + "</p>";
            return hm;
        }
        $(document).ready(function () {
            $("#div_cont").html(toHTML(index));
        });

        function fnNext() {

            index++;
            if (index >= img.length) {
                index = 0;
            }

            $("#div_cont").html(toHTML(index));
            console.log('$("#div_cont").html() : ' + $("#div_cont").html());
            console.log('$("#div_cont").text() : ' + $("#div_cont").text());
        }
    </script>
</head>

<div id="div_cont" style="border-style:solid; border-width:1px; min-height:150px; padding:10px;">
