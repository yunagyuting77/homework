 <script src="js/jquery-3.7.1.min.js"></script>
    <script>
$(document).ready(function () {
    // Q1: 當點擊 id 為 btnOk 的按鈕時觸發事件
    $("#btnOk").click(function () {                
        
        // Q2: 使用 val() 抓取第一個數字
        var a = parseInt($("#txtA").val());
        
        // Q3: 使用 val() 抓取第二個數字
        var b = parseInt($("#txtB").val());                
        
        // Q4: 使用 val() 抓取下拉選單目前的運算符號
        var op = $("#selOp").val();
        
        // 將運算結果顯示在 span 標籤中
        $("span").text(getCompute(a, b, op));
    }) 

    // 運算邏輯函式
    function getCompute(a, b, op) {
        if (op == "+") { return a + b; } 
        else if (op == "-") { return a - b; } 
        else if (op == "*") { return a * b; } 
        else if (op == "/") { return a / b; }
    }
});
    </script>
